<!doctype html>
<html lang="zh-CN">
  <head>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('defi-pilot-theme')
          if (!raw) return
          var data = JSON.parse(raw)
          if (data && data.state && data.state.theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light')
            document.documentElement.style.colorScheme = 'light'
          }
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <title>DeFi Pilot — AI Cross-Chain DeFi Protocol</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
