specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DeFiPilotVault
    network: sepolia
    source:
      address: "0x55CAB33e07D3c99A008D18f96B04641E20D67550"
      abi: DeFiPilotVault
      # TODO: 替换为实际部署区块号（在 Sepolia Etherscan 查 proxy 的部署交易）
      startBlock: 7700000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - Position
        - VaultStats
        - DepositEvent
        - WithdrawEvent
        - StrategyEvent
        - PositionClosedEvent
        - ProtocolWhitelistEvent
      abis:
        - name: DeFiPilotVault
          file: ./abis/DeFiPilotVault.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: StrategyExecuted(indexed address,address,uint256)
          handler: handleStrategyExecuted
        - event: PositionClosed(indexed address,uint256,uint256)
          handler: handlePositionClosed
        - event: ProtocolWhitelisted(address,bool)
          handler: handleProtocolWhitelisted
        - event: ETHRescued(indexed address,uint256)
          handler: handleETHRescued
      file: ./src/vault.ts

  - kind: ethereum
    name: IntentExecutor
    network: sepolia
    source:
      address: "0x7a24b1B70FB60c013513E475CC0107114c6eAbeB"
      abi: IntentExecutor
      # TODO: 替换为实际部署区块号
      startBlock: 7700000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - IntentsBatchEvent
      abis:
        - name: IntentExecutor
          file: ./abis/IntentExecutor.json
      eventHandlers:
        - event: IntentsBatchExecuted(indexed address,uint256)
          handler: handleIntentsBatchExecuted
      file: ./src/executor.ts
